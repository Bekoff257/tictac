apiVersion: apps/v1
kind: Deployment
metadata:
  name: tictac-backend
spec:
  replicas: 6
  selector:
    matchLabels:
      app: tictac-backend
  template:
    metadata:
      labels:
        app: tictac-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/company/tictac-backend:latest
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
---
apiVersion: v1
kind: Service
metadata:
  name: tictac-backend
spec:
  selector:
    app: tictac-backend
  ports:
    - port: 80
      targetPort: 4000
